name: Branch lifecycle report

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  branch-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate branch lifecycle report
        run: |
          python scripts/git/cleanup_branches.py \
            --base-branch origin/main \
            --stale-days 90 \
            --output branch-lifecycle-report.md

      - name: Create or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'branch-lifecycle-report.md';
            const reportBody = fs.readFileSync(path, 'utf8');
            const title = 'Automated branch lifecycle report';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find(issue => issue.title === title);

            const baseLabels = existing
              ? existing.labels.map(label => typeof label === 'string' ? label : label.name).filter(Boolean)
              : [];
            const labels = Array.from(new Set([...baseLabels, 'branch-maintenance']));

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: reportBody,
                labels,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: reportBody,
                labels,
              });
            }
